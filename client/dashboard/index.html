<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="icon" href="../assets/icons/dashboard.ico" type="image/x-icon" />
  </head>
  <body style="display: flex; flex-direction: column; align-items: center">
    <div id="stats">
      <table class="system-stats-table">
        <thead>
          <tr>
            <td class="header-cell">Elemento</td>
            <td class="header-cell">Detalle</td>
            <td class="header-cell">Valor</td>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr id="cpu_row">
            <td>CPU</td>
            <td>Uso actual</td>
            <td class="value-cell" id="cpu-value"></td>
          </tr>
          <tr id="ram_row">
            <td>RAM</td>
            <td>Usado / Total / %</td>
            <td class="value-cell" id="ram-value"></td>
          </tr>
          <tr id="temp_row">
            <td>Temperatura</td>
            <td>CPU</td>
            <td class="value-cell" id="temp-value"></td>
          </tr>
          <tr id="net_row">
            <td>Red</td>
            <td>Subida / Bajada</td>
            <td class="value-cell" id="net-value"></td>
          </tr>
          <tr>
            <td class="section-cell">Discos</td>
            <td>Nombre</td>
            <td class="section-cell">Usado / Total</td>
          </tr>
        </tbody>
      </table>
      <a href="/">
        <button class="stockBtn">Volver</button>
      </a>
    </div>
  </body>
  <script type="module" src="controller.js"></script>
</html>
