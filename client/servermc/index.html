<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SERVER</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="icon" href="../assets/mc-server.ico" type="image/x-icon" />

    <link rel="preload" as="image" href="../assets/sv_night.webp" />
  </head>
  <body id="server-bg">
    <div id="sv_page_wrapper">
      <aside id="sv_data">
        <h2>Jugadores:</h2>
        <ul id="player_list">
          <li>Cargando...</li>
        </ul>
      </aside>
      <main id="main_sv_container">
        <h1 class="color-text warm-text sv_text">
          IP: waffle-job.gl.joinmc.link
        </h1>
        <h1 class="color-text warm-text sv_text" style="font-size: 36px">
          Laucher: NeoForge
        </h1>
        <h1 class="color-text warm-text sv_text" style="font-size: 36px">
          Version: 1.21.1
        </h1>
        <a
          href="https://drive.google.com/file/d/1Wd1LhvZLBO481OZQNUntqLJNSXYo_Lrr/view?usp=drive_link"
          style="text-decoration: none"
          target="_blank"
        >
          <h1 class="color-text warm-text sv_text" style="font-size: 36px">
            Descargar Mods
          </h1>
        </a>

        <div id="state-container">
          <h1 id="state_text">
            <div class="state_text_fragment">Estado del</div>
            <div class="state_text_fragment">server:</div>
          </h1>
          <h1 id="state">Cargando Estado...</h1>
        </div>
        <button id="manage_sv" class="stockBtn" style="font-size: 24px">
          Cargando Estado...
        </button>

        <a href="/">
          <button class="stockBtn">Volver</button>
        </a>
      </main>
    </div>
  </body>
  <script type="module" src="controller.js"></script>
</html>
